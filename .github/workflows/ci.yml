name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Build backend
        run: go build ./...

      - name: Security health gate
        env:
          PORT: "18080"
        run: |
          set -euo pipefail
          go run . > /tmp/bedboard-security.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" >/dev/null 2>&1 || true' EXIT

          curl --retry 30 --retry-delay 1 --retry-connrefused --fail --silent --show-error "http://127.0.0.1:${PORT}/api/me" > /dev/null

          LOGIN_CODE="$(curl --silent --show-error --output /tmp/bedboard-login.json --write-out "%{http_code}" \
            --cookie-jar /tmp/bedboard-cookie.txt \
            --header "Content-Type: application/json" \
            --data '{"username":"admin","password":"ChangeMe!123"}' \
            "http://127.0.0.1:${PORT}/api/auth")"
          if [[ "$LOGIN_CODE" != "200" ]]; then
            cat /tmp/bedboard-login.json
            cat /tmp/bedboard-security.log
            exit 1
          fi

          HEALTH_CODE="$(curl --silent --show-error --output /tmp/bedboard-security-health.json --write-out "%{http_code}" \
            --cookie /tmp/bedboard-cookie.txt \
            "http://127.0.0.1:${PORT}/api/admin/security/health")"
          if [[ "$HEALTH_CODE" != "200" ]]; then
            cat /tmp/bedboard-security-health.json
            cat /tmp/bedboard-security.log
            exit 1
          fi

          node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync("/tmp/bedboard-security-health.json","utf8")); console.log("security health status:", data.status); if(data.status === "fail"){ process.exit(1); }'

      - name: Run linter (gofmt check)
        run: |
          set -euo pipefail
          UNFORMATTED="$(gofmt -l .)"
          if [[ -n "$UNFORMATTED" ]]; then
            echo "$UNFORMATTED"
            echo "gofmt check failed: unformatted files detected"
            exit 1
          fi
