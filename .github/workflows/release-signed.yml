name: Release

on:
  push:
    tags:
      - 'beta-*'

permissions:
  contents: write
  id-token: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Sync frontend assets for backend embed
        run: bash scripts/prepare-backend-assets.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Security health gate (release)
        env:
          PORT: "18080"
        run: |
          set -euo pipefail
          go run ./backend > /tmp/bedboard-security.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" >/dev/null 2>&1 || true' EXIT

          curl --retry 30 --retry-delay 1 --retry-connrefused --fail --silent --show-error "http://127.0.0.1:${PORT}/api/me" > /dev/null

          LOGIN_CODE="$(curl --silent --show-error --output /tmp/bedboard-login.json --write-out "%{http_code}" \
            --cookie-jar /tmp/bedboard-cookie.txt \
            --header "Content-Type: application/json" \
            --data '{"username":"admin","password":"ChangeMe!123"}' \
            "http://127.0.0.1:${PORT}/api/auth")"
          if [[ "$LOGIN_CODE" != "200" ]]; then
            cat /tmp/bedboard-login.json
            cat /tmp/bedboard-security.log
            exit 1
          fi

          HEALTH_CODE="$(curl --silent --show-error --output /tmp/bedboard-security-health.json --write-out "%{http_code}" \
            --cookie /tmp/bedboard-cookie.txt \
            "http://127.0.0.1:${PORT}/api/admin/security/health")"
          if [[ "$HEALTH_CODE" != "200" ]]; then
            cat /tmp/bedboard-security-health.json
            cat /tmp/bedboard-security.log
            exit 1
          fi

          node -e 'const fs=require("fs"); const data=JSON.parse(fs.readFileSync("/tmp/bedboard-security-health.json","utf8")); console.log("security health status:", data.status); if(data.status === "fail"){ process.exit(1); }'

      - name: Build unsigned Windows binary
        run: |
          mkdir -p release
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags="-s -w" -o release/BedBoard_windows_amd64.exe ./backend

      - name: Build Linux binary
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o release/BedBoard_linux_amd64 ./backend
          tar -czf release/BedBoard_linux_amd64.tar.gz -C release BedBoard_linux_amd64

      - name: Package ZIP
        run: |
          rm -f release/BedBoard_windows_amd64.zip
          zip -j release/BedBoard_windows_amd64.zip release/BedBoard_windows_amd64.exe

      - name: Generate checksums
        run: |
          cd release
          sha256sum BedBoard_windows_amd64.exe BedBoard_windows_amd64.zip BedBoard_linux_amd64 BedBoard_linux_amd64.tar.gz > checksums.txt

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.5.0

      - name: Keyless sign release artifacts
        env:
          COSIGN_YES: "true"
        run: |
          cosign sign-blob --yes --output-signature release/BedBoard_windows_amd64.exe.sig --output-certificate release/BedBoard_windows_amd64.exe.pem release/BedBoard_windows_amd64.exe
          cosign sign-blob --yes --output-signature release/BedBoard_windows_amd64.zip.sig --output-certificate release/BedBoard_windows_amd64.zip.pem release/BedBoard_windows_amd64.zip
          cosign sign-blob --yes --output-signature release/BedBoard_linux_amd64.sig --output-certificate release/BedBoard_linux_amd64.pem release/BedBoard_linux_amd64
          cosign sign-blob --yes --output-signature release/BedBoard_linux_amd64.tar.gz.sig --output-certificate release/BedBoard_linux_amd64.tar.gz.pem release/BedBoard_linux_amd64.tar.gz
          cosign sign-blob --yes --output-signature release/checksums.txt.sig --output-certificate release/checksums.txt.pem release/checksums.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            release/BedBoard_linux_amd64
            release/BedBoard_linux_amd64.tar.gz
            release/BedBoard_windows_amd64.zip
            release/BedBoard_windows_amd64.exe
            release/checksums.txt
            release/BedBoard_windows_amd64.exe.sig
            release/BedBoard_windows_amd64.exe.pem
            release/BedBoard_windows_amd64.zip.sig
            release/BedBoard_windows_amd64.zip.pem
            release/BedBoard_linux_amd64.sig
            release/BedBoard_linux_amd64.pem
            release/BedBoard_linux_amd64.tar.gz.sig
            release/BedBoard_linux_amd64.tar.gz.pem
            release/checksums.txt.sig
            release/checksums.txt.pem
          generate_release_notes: true
