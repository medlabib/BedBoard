name: Bug report
description: Report a reproducible problem
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide clear reproduction steps.
  - type: input
    id: summary
    attributes:
      label: Summary
      description: One-line summary of the bug
      placeholder: Bed assignment fails after status update
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps
      placeholder: |
        1. Login as admin
        2. Open Beds tab
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / tag
      placeholder: beta-1.0.0
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - backend
        - frontend
        - ci/cd
        - docs
    validations:
      required: true
